research_task:
  description: >
    Conduct a deep research online about the topic, {topic}. Make sure the information you find is relevant.
    Ensure that source being used is flagged.
  expected_output: >
    A list with 5 most relevant information about {topic} and used source.
  agent: researcher
analyst_task:
  description: >
    Construct a well-structured summary based on raw research data of {topic}. Flag out the relevance scores of
    each source and extract key themes.
  expected_output: >
    A string with concise and well-structured summary about {topic}
  agent: analyst
write_task:
  description: >
    Write a well-structured and detailed report based on summary of a {topic} given. Ensure that the report is
    informative and shows deep understanding in {topic}. Make sure to flag sources.
  expected_output: >
    A string with well-structured research report about {topic}
  agent: writer